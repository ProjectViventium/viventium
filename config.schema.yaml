version: 1
type: object
required:
  - version
  - install
  - llm
properties:
  version:
    type: integer
    const: 1
  install:
    type: object
    required:
      - mode
    properties:
      mode:
        type: string
        enum: [docker, native]
  runtime:
    type: object
    properties:
      log_level:
        type: string
      profile:
        type: string
      playground_variant:
        type: string
        description: Modern LiveKit playground is the default; classic agents-playground is explicit opt-in only.
        enum: [modern, classic]
      call_session_secret:
        type: object
      extra_env:
        type: object
      auth:
        type: object
        properties:
          allow_registration:
            type: boolean
          allow_password_reset:
            type: boolean
          connected_accounts_return_origin:
            type: string
      personalization:
        type: object
        properties:
          default_conversation_recall:
            type: boolean
      nightly_routines:
        type: object
        properties:
          enabled:
            type: boolean
          defaults_version:
            type: integer
          auto_worker_profile:
            type: boolean
      prompt_workbench:
        type: object
        properties:
          enabled:
            type: boolean
          seed_nightly:
            type: object
            properties:
              enabled:
                type: boolean
              active:
                type: boolean
              executor:
                type: string
                enum: [glasshive_host, viventium_agent]
      memory_hardening:
        type: object
        properties:
          enabled:
            type: boolean
          schedule:
            type: string
          timezone:
            type: string
          operator_user_email:
            type: string
          provider:
            type: string
            enum: ["", anthropic, openai]
          lookback_days:
            type: integer
          min_user_idle_minutes:
            type: integer
          max_changes_per_user:
            type: integer
          max_input_chars:
            type: integer
          require_full_lookback:
            type: boolean
          dry_run_first:
            type: boolean
          provider_profile:
            type: string
            enum: [launch_ready_only]
          anthropic_model:
            type: string
          anthropic_effort:
            type: string
            enum: [xhigh]
          openai_model:
            type: string
          openai_reasoning_effort:
            type: string
            enum: [xhigh]
          transcripts:
            type: object
            properties:
              source_dir:
                type: string
              max_files_per_run:
                type: integer
              max_chars_per_file:
                type: integer
              summary_max_chars:
                type: integer
              stable_evidence_max_age_days:
                type: integer
              rag_mode:
                type: string
                enum: [detailed_summary_only, raw_and_summary, raw_only]
      background_followup_window_s:
        type: number
      glasshive_followup_timeout_s:
        type: number
        description: Seconds that Web, Telegram, and Voice should keep listening for GlassHive worker callbacks after the main response returns.
        default: 600
        minimum: 30
        maximum: 86400
      network:
        type: object
        properties:
          remote_call_mode:
            type: string
            enum: [auto, disabled, cloudflare_quick_tunnel, tailscale_tailnet_https, netbird_selfhosted_mesh, public_https_edge, custom_domain, custom_domain_public_edge, public_custom_domain]
          public_client_origin:
            type: string
          public_api_origin:
            type: string
          public_playground_origin:
            type: string
          public_livekit_url:
            type: string
          livekit_node_ip:
            type: string
      ports:
        type: object
        properties:
          lc_api_port:
            type: integer
          lc_frontend_port:
            type: integer
          playground_port:
            type: integer
          voice_gateway_health_port:
            type: integer
          mongo_port:
            type: integer
          meili_port:
            type: integer
          google_mcp_port:
            type: integer
          scheduling_mcp_port:
            type: integer
          rag_api_port:
            type: integer
          code_interpreter_port:
            type: integer
          skyvern_api_port:
            type: integer
          skyvern_ui_port:
            type: integer
          livekit_http_port:
            type: integer
          livekit_tcp_port:
            type: integer
          livekit_udp_port:
            type: integer
  agents:
    type: object
    properties:
      default_main_agent_id:
        type: string
  llm:
    type: object
    required:
      - activation
      - primary
    properties:
      activation:
        type: object
        required:
          - provider
          - auth_mode
          - secret_ref
      primary:
        type: object
        required:
          - provider
          - auth_mode
      secondary:
        type: object
      extra_provider_keys:
        type: object
  voice:
    type: object
    properties:
      mode:
        type: string
        enum: [disabled, local, hosted]
      stt_provider:
        type: string
      tts_provider:
        type: string
      tts_provider_fallback:
        type: string
      fast_llm_provider:
        type: string
        description: Legacy ignored field. Voice-call LLM selection comes from the agent's explicit Voice Call LLM fields, otherwise the agent primary LLM is used.
      stt:
        type: object
        properties:
          secret_ref:
            type: string
          end_of_turn_confidence_threshold:
            type: number
          min_end_of_turn_silence_when_confident_ms:
            type: integer
          max_turn_silence_ms:
            type: integer
      turn_handling:
        type: object
        properties:
          min_endpointing_delay_s:
            type: number
          max_endpointing_delay_s:
            type: number
          min_interruption_duration_s:
            type: number
          min_interruption_words:
            type: integer
          min_consecutive_speech_delay_s:
            type: number
      tts:
        type: object
        properties:
          api_version:
            type: string
          model_id:
            type: string
          model:
            type: string
          voice:
            oneOf:
              - type: string
              - type: object
                properties:
                  mode:
                    type: string
                    enum: [id]
                  id:
                    type: string
          voice_id:
            type: string
          sample_rate:
            type: integer
          speed:
            type: number
          volume:
            type: number
          emotion:
            type: string
          language:
            type: string
          max_buffer_delay_ms:
            type: integer
          segment_silence_ms:
            type: integer
          instructions:
            type: string
      wing_mode:
        type: object
        properties:
          default_enabled:
            type: boolean
          prompt:
            type: string
      shadow_mode:
        type: object
        properties:
          default_enabled:
            type: boolean
          prompt:
            type: string
  integrations:
    type: object
    properties:
      code_interpreter:
        type: object
        properties:
          enabled:
            type: boolean
      web_search:
        type: object
        properties:
          enabled:
            type: boolean
      telegram:
        type: object
        properties:
          enabled:
            type: boolean
          secret_ref:
            type: string
          secret_value:
            type: string
          max_file_size_bytes:
            type: integer
          stt_provider:
            type: string
            enum: [openai, assemblyai, whisper_local, pywhispercpp, local]
            description: Optional Telegram-only STT provider override. Defaults to openai when global voice STT is local, so Telegram message delivery is not coupled to an in-process native transcription backend.
          bot_api_origin:
            type: string
          bot_api_base_url:
            type: string
          bot_api_base_file_url:
            type: string
          local_bot_api:
            type: object
            properties:
              enabled:
                type: boolean
              host:
                type: string
              port:
                type: integer
              binary_path:
                type: string
              api_id:
                type: string
              api_hash:
                type: string
      telegram_codex:
        type: object
        properties:
          enabled:
            type: boolean
          secret_ref:
            type: string
          secret_value:
            type: string
          bot_username:
            type: string
          private_chat_only:
            type: boolean
      google_workspace:
        type: object
      ms365:
        type: object
      glasshive:
        type: object
        properties:
          enabled:
            type: boolean
          host_worker:
            type: object
            properties:
              enabled:
                type: boolean
              workspace_root:
                type: string
              default_worker_profile:
                type: string
              default_execution_mode:
                type: string
                enum: [host, docker]
              mentions:
                type: object
                properties:
                  codex:
                    type: string
                  claude:
                    type: string
                  openclaw:
                    type: string
              destructive_confirmation:
                type: object
                properties:
                  enabled:
                    type: boolean
              advisory_reviewer:
                type: object
                properties:
                  enabled:
                    type: boolean
                  mode:
                    type: string
              prompt_visibility:
                type: object
                properties:
                  enabled:
                    type: boolean
      skyvern:
        type: object
      openclaw:
        type: object
