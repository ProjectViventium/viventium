version: 1
install:
  mode: native
runtime:
  log_level: info
  profile: isolated
  network:
    # Supported modes: disabled, cloudflare_quick_tunnel, tailscale_tailnet_https,
    # netbird_selfhosted_mesh, public_https_edge.
    # `custom_domain` is accepted as a clearer alias for `public_https_edge`.
    # Choose one:
    # - disabled: local-only install, no remote browser access
    # - tailscale_tailnet_https: easiest for your own devices when they can run Tailscale
    # - custom_domain/public_https_edge: best for any browser anywhere; requires a real public edge
    remote_call_mode: disabled
    # Leave these blank for automatic Tailscale mode or the temporary public sslip.io fallback.
    # Set them explicitly for NetBird or your own stable public subdomains when using
    # custom_domain/public_https_edge.
    public_client_origin: ""
    public_api_origin: ""
    public_playground_origin: ""
    public_livekit_url: ""
    livekit_node_ip: ""
  personalization:
    default_conversation_recall: false
  ports:
    lc_api_port: 3180
    lc_frontend_port: 3190
    playground_port: 3300
    mongo_port: 27117
    meili_port: 7700
    livekit_http_port: 7888
    livekit_tcp_port: 7889
    livekit_udp_port: 7890
  playground_variant: modern
  call_session_secret:
    secret_ref: keychain://viventium/call_session_secret
agents:
  default_main_agent_id: agent_viventium_main_95aeb3
llm:
  activation:
    provider: groq
    auth_mode: api_key
    secret_ref: keychain://viventium/groq_api_key
  primary:
    provider: openai
    auth_mode: connected_account
  secondary:
    provider: none
    auth_mode: disabled
voice:
  mode: local
  stt_provider: whisper_local
  tts_provider: browser
  tts:
    voice: coral
    speed: 1.12
  wing_mode:
    default_enabled: false
integrations:
  code_interpreter:
    enabled: false
  web_search:
    enabled: false
  telegram:
    enabled: false
  telegram_codex:
    enabled: false
  google_workspace:
    enabled: false
  ms365:
    enabled: false
  skyvern:
    enabled: false
  openclaw:
    enabled: false
