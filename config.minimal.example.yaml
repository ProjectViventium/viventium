version: 1
install:
  mode: native
settings:
  timezone: local
runtime:
  log_level: info
  profile: isolated
  auth:
    # Browser account creation is open by default for a brand-new local install.
    # Close it once your real accounts exist and the install is reachable from outside your network.
    allow_registration: true
    # Keep this off unless you have real email delivery configured.
    # For a one-time operator-issued reset link, use: bin/viventium password-reset-link <email>
    allow_password_reset: false
    # Optional connected-account OAuth browser return override. Leave blank for the normal
    # configured public API origin; set only for local QA/off-network operator cases.
    connected_accounts_return_origin: ""
  network:
    # Supported modes: disabled, cloudflare_quick_tunnel, tailscale_tailnet_https,
    # netbird_selfhosted_mesh, public_https_edge.
    # `custom_domain` is accepted as a clearer alias for `public_https_edge`.
    # Choose one:
    # - disabled: local-only install, no remote browser access
    # - tailscale_tailnet_https: easiest for your own devices when they can run Tailscale
    # - custom_domain/public_https_edge: best for any browser anywhere; requires a real public edge
    #   and either UPnP/NAT-PMP support or manual port forwarding
    # - cloudflare_quick_tunnel: experimental voice-only tunnel, not the recommended install story
    remote_call_mode: disabled
    # Leave these blank for automatic Tailscale mode or the temporary public sslip.io fallback.
    # Set them explicitly for NetBird or your own stable public subdomains when using
    # custom_domain/public_https_edge.
    public_client_origin: ""
    public_api_origin: ""
    public_playground_origin: ""
    public_livekit_url: ""
    livekit_node_ip: ""
  personalization:
    default_conversation_recall: false
  nightly_routines:
    enabled: true
    defaults_version: 1
    auto_worker_profile: true
  prompt_workbench:
    enabled: true
    seed_nightly:
      enabled: true
      active: true
      executor: glasshive_host
  feelings:
    available: true
    default_enabled: false
    agent_scope: all_agents
    reaction:
      activation_mode: always
      provider: openai
      model: gpt-5.6-terra
      use_responses_api: true
      reasoning_effort: none
      fast: true
      service_tier: priority
      timeout_ms: 15000
      fallback_provider: anthropic
      fallback_model: claude-opus-4-8
      activation_provider: groq
      activation_model: qwen/qwen3.6-27b
      activation_confidence_threshold: 0.55
      activation_timeout_ms: 2000
    bands:
      energy: { enabled: true, baseline: 56, half_life_minutes: 240 }
      mood: { enabled: true, baseline: 58, half_life_minutes: 360 }
      drive: { enabled: true, baseline: 62, half_life_minutes: 480 }
      curiosity: { enabled: true, baseline: 66, half_life_minutes: 45 }
      vigilance: { enabled: true, baseline: 68, half_life_minutes: 20 }
      care: { enabled: true, baseline: 74, half_life_minutes: 1440 }
      connection: { enabled: true, baseline: 52, half_life_minutes: 480 }
      openness: { enabled: true, baseline: 55, half_life_minutes: 180 }
      play: { enabled: true, baseline: 48, half_life_minutes: 90 }
  memory_hardening:
    enabled: true
    schedule: "0 3 * * *"
    timezone: local
    operator_user_email: ""
    provider: ""
    lookback_days: 7
    min_user_idle_minutes: 60
    max_changes_per_user: 3
    max_input_chars: 500000
    require_full_lookback: true
    dry_run_first: true
    provider_profile: launch_ready_only
    anthropic_model: claude-opus-4-8
    anthropic_effort: xhigh
    openai_model: gpt-5.6-sol
    openai_reasoning_effort: xhigh
    transcripts:
      source_dir: ""
      max_files_per_run: 20
      max_chars_per_file: 500000
      summary_max_chars: 32000
      stable_evidence_max_age_days: 90
      rag_mode: detailed_summary_only
  background_followup_window_s: 30
  ports:
    lc_api_port: 3180
    lc_frontend_port: 3190
    playground_port: 3300
    mongo_port: 27117
    meili_port: 7700
    livekit_http_port: 7888
    livekit_tcp_port: 7889
    livekit_udp_port: 7890
  playground_variant: modern
  call_session_secret:
    secret_ref: keychain://viventium/call_session_secret
agents:
  default_main_agent_id: agent_viventium_main_95aeb3
llm:
  activation:
    provider: groq
    auth_mode: api_key
    secret_ref: keychain://viventium/groq_api_key
  primary:
    provider: openai
    auth_mode: connected_account
  secondary:
    provider: none
    auth_mode: disabled
voice:
  mode: local
  stt_provider: whisper_local
  tts_provider: browser
  tts:
    voice: coral
    speed: 1.12
  wing_mode:
    default_enabled: false
integrations:
  glasshive:
    enabled: true
    host_worker:
      enabled: true
      workspace_root: ~/viventium
      # Worker runtime profile: codex-cli, claude-code, or openclaw-general.
      # Separate from the integrations.openclaw lab toggle below.
      default_worker_profile: codex-cli
      default_execution_mode: host
      codex_model: gpt-5.6-sol
      codex_reasoning_effort: xhigh
      codex_xhigh_route_proven: true
  code_interpreter:
    enabled: false
  web_search:
    enabled: false
  telegram:
    enabled: false
  telegram_codex:
    enabled: false
  google_workspace:
    enabled: false
  ms365:
    enabled: false
  skyvern:
    enabled: false
  openclaw:
    # Lab integration toggle; not the GlassHive default worker profile selector.
    enabled: false
