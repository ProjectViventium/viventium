name: Release Policy

on:
  pull_request:
  push:

jobs:
  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install pytest pyyaml
      - run: python -m pytest tests/release/test_public_bootstrap_manifests.py tests/release/test_private_repo_resolution_contract.py -q
