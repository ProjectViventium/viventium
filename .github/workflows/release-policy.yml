name: Release Policy

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: release-policy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  manifests:
    name: Validate public release policy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - run: python -m pip install pytest pyyaml
      - run: >-
          python -m pytest
          tests/release/test_public_bootstrap_manifests.py
          tests/release/test_private_repo_resolution_contract.py
          tests/release/test_qa_operating_contract.py::test_release_tests_have_central_qa_ownership
          tests/release/test_qa_storage_guard.py
          -q
