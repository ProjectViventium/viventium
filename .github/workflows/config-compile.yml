name: Config Compile

on:
  pull_request:
  push:

jobs:
  python:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -r scripts/viventium/requirements.txt pytest
      - run: >
          python -m pytest tests/release/test_config_compiler.py -q -k
          "renders_structured_telegram_bot_api_settings or
          renders_managed_local_telegram_bot_api_settings or
          rejects_conflicting_managed_and_explicit_telegram_bot_api_settings"
