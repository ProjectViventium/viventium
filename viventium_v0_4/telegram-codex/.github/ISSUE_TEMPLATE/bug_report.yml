name: Bug report
description: Report a broken behavior in telegram-codex
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing this. Please keep secrets, bot tokens, and personal chat details out of the issue.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
  - type: textarea
    id: environment
    attributes:
      label: Environment

